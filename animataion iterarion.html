<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title></title>
	<style type="text/css">
	.box-container{
		width: 600px;
		height: 600px;
		border: 2px black solid;
		margin: auto;
		position: relative;
	}

	.box{
		width: 200px;
		height: 200px;
		background: red;
		position: absolute;
		top: 0px;
		left: 0px;
		animation-name: box;
		animation-duration: 1s;
		/*animation-delay: 5s;*/
		animation-iteration-count:infinite ;
		animation-fill-mode: both;
		/*animation-direction:reverse alternate ;*/
	}
	@keyframes box{
	13%{
		top:0px;
		left:0px;
		background: red;

	}
    26%{ 
		top:0px ;
		left: 400px;
		background: yellow;	
		}
	61%{
		top: 400px;
		left: 400px;
		background: blue;	
		}
	78%{
		top: 400px;
		left: 0px;
		background:darkgreen;	
		}
		100%{
		top: 0px;
		left: 0px;
		background:red;	
		}
	}	
	</style>
</head>
<body>
	<div class="box-container">
		<div class="box"></div>
	</div>
</body>
</html>
